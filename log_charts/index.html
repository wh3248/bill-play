<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./chart.css" />

    <title>Request Volume by Hour</title>
    <script src="https://cdn.plot.ly/plotly-2.28.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>

<body>
    <main>
        <div class="chart-row">
            <div id="chart_1" class="chart-item"></div>
            <div id="chart_2" class="chart-item"></div>
        </div>
        <div class="note" id="controls">
            <div style="display: grid; gap: 12px;">
                <div>
                    <strong>Time Bucket:</strong>
                    <div style="display: flex; gap: 12px; margin-top: 6px;">
                        <label>
                            <input type="radio" name="timeBucket" value="daily" checked /> Daily
                        </label>
                        <label>
                            <input type="radio" name="timeBucket" value="hourly" /> Hourly
                        </label>
                    </div>
                </div>
                <div>
                    <label for="startSlider"><strong>Start hour:</strong> <span id="startLabel">—</span></label>
                    <input type="range" id="startSlider" min="0" max="0" value="0"
                        style="width: 100%; margin-top: 6px;" />
                </div>
                <div>
                    <label for="endSlider"><strong>End hour:</strong> <span id="endLabel">—</span></label>
                    <input type="range" id="endSlider" min="0" max="0" value="0"
                        style="width: 100%; margin-top: 6px;" />
                </div>
            </div>
        </div>
        <div id="status">Loading data ...</div>
    </main>
    <script type="module">
        import { loadCsv } from './load_csv.js';
        import { requestsPerTimeChart } from './requests_per_time_chart.js';
        import { durationPerTimeChart } from './duration_per_time_chart.js';
        import { timeSliderHandler } from './controls_handler.js';
        const chartViewConfig = {
            startSliderId: 'startSlider',
            endSliderId: 'endSlider',
            startLabelId: 'startLabel',
            endLabelId: 'endLabel',
            charts: [
                {
                    chartId: "chart_1",
                    chartFunction: requestsPerTimeChart,
                },
                {
                    chartId: "chart_2",
                    chartFunction: durationPerTimeChart,
                }
            ]
        };
        loadCsv('cleaned_logs.csv')
            .then(data => {
                timeSliderHandler(chartViewConfig, data);
                chartViewConfig.charts.forEach(element => {
                    element.chartFunction(element.chartId);
                });
            })
            .catch(error => {
                const status = document.getElementById('status');
                status.textContent = error.message;
                status.classList.add('error');
                console.error(error);
            });
    </script>
</body>

</html>
